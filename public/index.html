<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Level Devil — Can You Survive?</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-dim": "#ea8400", "primary-dim": "#e51a22", "on-secondary-container": "#f7f7ff",
                        "secondary-dim": "#0f6df3", "on-tertiary-container": "#462400", "tertiary-container": "#fd9000",
                        "outline": "#767576", "surface-container-lowest": "#000000", "tertiary": "#ffa44c",
                        "on-secondary-fixed": "#003076", "error-container": "#a70138", "on-surface": "#ffffff",
                        "on-surface-variant": "#adaaab", "on-primary-container": "#4f0003", "secondary-container": "#0058ca",
                        "surface-bright": "#2c2c2d", "on-primary": "#650006", "primary-fixed-dim": "#ff5b51",
                        "primary": "#ff8e83", "on-tertiary-fixed": "#281200", "inverse-primary": "#c10014",
                        "outline-variant": "#484849", "inverse-surface": "#fcf8f9", "surface-container-high": "#201f21",
                        "surface-container": "#19191b", "secondary-fixed": "#c0d1ff", "tertiary-fixed-dim": "#f18900",
                        "tertiary-fixed": "#ff9727", "primary-container": "#ff766b", "error": "#ff6e84",
                        "background": "#0e0e0f", "on-primary-fixed-variant": "#600005", "on-background": "#ffffff",
                        "surface": "#0e0e0f", "on-error-container": "#ffb2b9", "secondary-fixed-dim": "#acc3ff",
                        "on-tertiary-fixed-variant": "#592f00", "on-secondary": "#001d4e", "on-tertiary": "#552d00",
                        "on-primary-fixed": "#000000", "primary-fixed": "#ff766b", "surface-variant": "#262627",
                        "secondary": "#6e9bff", "surface-container-low": "#131314", "error-dim": "#d73357",
                        "surface-container-highest": "#262627", "on-error": "#490013", "inverse-on-surface": "#565556",
                        "surface-dim": "#0e0e0f", "on-secondary-fixed-variant": "#004baf", "surface-tint": "#ff8e83"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"], "body": ["Manrope"], "label": ["Space Grotesk"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #0e0e0f;
            overflow: hidden;
        }

        .font-space-grotesk {
            font-family: 'Space Grotesk', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-panel {
            background: rgba(25, 25, 27, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .scanline-overlay {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #gameCanvas {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 560px;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1a1c 0%, #0e0e0f 100%);
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(255, 42, 75, 0.1);
        }

        #overlay.hidden {
            display: none !important;
        }

        #leaderboardModal.open {
            display: flex !important;
        }

        #warningBanner {
            position: absolute;
            top: 48px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            padding: 8px 26px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #fff;
            font-size: 0.8rem;
            font-weight: 700;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.35s;
            text-align: center;
            letter-spacing: 1.5px;
            white-space: nowrap;
            backdrop-filter: blur(6px);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.8);
        }

        #warningBanner.show {
            opacity: 1;
        }
    </style>
</head>

<body class="text-on-surface select-none">
    <canvas id="gameCanvas" width="800" height="560"></canvas>
    <div class="fixed inset-0 scanline-overlay z-10"></div>

    <header
        class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-transparent pointer-events-none">
        <div
            class="font-space-grotesk tracking-tighter uppercase text-2xl font-black text-red-600 dark:text-red-500 italic pointer-events-auto">
            LEVEL DEVIL
        </div>
        <div class="flex items-center gap-6 pointer-events-auto">
            <button id="lbBtn"
                class="hidden text-zinc-500 hover:text-red-400 transition-colors scale-95 duration-75 flex gap-2">
                <span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span> Ranks
            </button>
        </div>
    </header>

    <div id="warningBanner"></div>

    <!-- HUD -->
    <div id="hud" class="fixed top-24 right-8 z-30 flex flex-col gap-4">
        <div class="glass-panel border-l-2 border-tertiary p-4 min-w-[140px]">
            <p class="font-space-grotesk text-[10px] text-zinc-400 tracking-widest uppercase mb-1">Current Sector</p>
            <p class="font-space-grotesk text-2xl font-bold text-tertiary">LVL. <span id="hudLevel">1</span></p>
        </div>
        <div class="glass-panel border-l-2 border-primary p-4 min-w-[140px]">
            <p class="font-space-grotesk text-[10px] text-zinc-400 tracking-widest uppercase mb-1">Casualties</p>
            <p class="font-space-grotesk text-2xl font-bold text-primary" id="hudDeaths">0</p>
        </div>
        <div class="glass-panel border-l-2 border-secondary p-4 min-w-[140px]">
            <p class="font-space-grotesk text-[10px] text-zinc-400 tracking-widest uppercase mb-1">Elapsed Time</p>
            <p class="font-space-grotesk text-2xl font-bold text-secondary" id="hudTime">0:00</p>
        </div>
    </div>

    <!-- Main Content Area / Overlay -->
    <main id="overlay" class="fixed inset-0 z-40 flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <section
            class="max-w-xl w-full mx-6 glass-panel p-12 rounded-xl shadow-[40px_0_60px_-15px_rgba(0,48,118,0.1)] border border-outline-variant/10 flex flex-col items-center">
            <div class="text-center mb-12">
                <h1 id="overlayTitle"
                    class="font-space-grotesk text-7xl font-black tracking-tighter text-primary italic uppercase mb-2">
                    LEVEL DEVIL
                </h1>
                <h2 id="overlaySubtitle"
                    class="font-space-grotesk text-tertiary tracking-[0.3em] uppercase text-sm font-bold">
                    Can You Survive?
                </h2>
                <p id="overlayDesc" class="font-body text-zinc-400 mt-4 text-xs tracking-widest uppercase">15 levels of
                    pure frustration. Trust nothing.</p>
            </div>

            <div class="space-y-6 w-full max-w-sm">
                <div id="nameSection" class="group flex items-center gap-4">
                    <label
                        class="font-space-grotesk text-[10px] text-zinc-500 uppercase tracking-widest whitespace-nowrap">Identity
                        Tag</label>
                    <input id="playerNameInput"
                        class="flex-1 w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/30 focus:ring-primary text-primary-fixed font-space-grotesk p-4 rounded-md tracking-widest uppercase transition-all text-center"
                        placeholder="ENTER YOUR NAME" type="text" maxlength="16" autocomplete="off" />
                </div>

                <div id="overlayStats" style="display:none"
                    class="flex justify-between border border-outline-variant/20 p-4 rounded bg-surface-container-lowest mb-6">
                    <div class="text-center">
                        <p class="font-space-grotesk text-[10px] text-zinc-400 uppercase tracking-widest">Deaths</p>
                        <p id="statDeaths" class="font-space-grotesk text-2xl text-primary font-bold">0</p>
                    </div>
                    <div class="text-center">
                        <p class="font-space-grotesk text-[10px] text-zinc-400 uppercase tracking-widest">Time</p>
                        <p id="statTime" class="font-space-grotesk text-2xl text-secondary font-bold">0:00</p>
                    </div>
                </div>

                <button id="overlayBtn"
                    class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-space-grotesk font-black py-5 text-xl tracking-widest rounded-md hover:shadow-[0_0_20px_rgba(255,142,131,0.4)] transition-all transform active:scale-95 uppercase">
                    START GAME
                </button>

                <p id="trollMsg" class="font-body italic text-tertiary text-center mt-4 text-sm min-h-[20px]"></p>
            </div>
        </section>
    </main>

    <!-- LEADERBOARD MODAL -->
    <div id="leaderboardModal"
        class="hidden fixed inset-0 z-[60] bg-black/80 items-center justify-center p-6 backdrop-blur-sm pointer-events-auto">
        <div class="w-full max-w-2xl bg-surface-container-high rounded-xl overflow-hidden shadow-2xl">
            <div class="bg-surface-bright p-6 flex justify-between items-center">
                <h2 class="font-space-grotesk text-xl font-bold text-primary uppercase tracking-tighter italic">World
                    Rankings</h2>
            </div>
            <div class="p-6">
                <div id="lbContent" class="space-y-4 max-h-[60vh] overflow-y-auto">
                    <div class="text-center text-zinc-500 py-10 font-space-grotesk tracking-widest uppercase">
                        Loading records...
                    </div>
                </div>

                <div class="mt-6 text-center">
                    <button id="lbClose"
                        class="bg-surface-container border border-outline-variant/20 text-on-surface-variant font-space-grotesk py-3 px-8 text-xs tracking-widest rounded-md hover:bg-surface-bright transition-colors uppercase">
                        CLOSE ARCHIVE
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
